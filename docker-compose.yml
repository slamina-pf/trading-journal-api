version: "3.9"

services:
  api:
    build:
      context: .
    container_name: trading_journal_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5000:5000"
    networks:
      - trading_journal_net

networks:
  trading_journal_net:
    external: true
    name: trading_journal_net
